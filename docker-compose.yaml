services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: barbershop
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

#  redis:
